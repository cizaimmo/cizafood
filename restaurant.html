<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CizaFood+ ERP Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
margin:0;
font-family:Inter;
background:#0B0B0C;
color:#fff;
}

/* HEADER */
.header{
padding:15px;
border-bottom:1px solid #222;
}

.topbar{
display:flex;
justify-content:space-between;
font-size:14px;
color:#aaa;
}

.clock{
color:#D4AF37;
font-weight:800;
}

/* KPI */
.kpi{
display:flex;
gap:10px;
padding:10px;
overflow-x:auto;
}

.kpi .box{
background:#151517;
padding:12px;
border-radius:10px;
min-width:120px;
}

/* KANBAN */
.board{
display:flex;
overflow-x:auto;
gap:15px;
padding:10px;
}

.column{
min-width:300px;
}

.column h3{
margin-bottom:10px;
}

/* CARD */
.card{
background:#151517;
padding:12px;
border-radius:12px;
margin-bottom:10px;
border:1px solid #222;
}

.meta{
font-size:12px;
color:#aaa;
margin-top:5px;
line-height:1.4;
}

.timer{
font-size:12px;
font-weight:700;
margin-top:5px;
}

.urgent{
color:red;
}

/* DRIVER */
.driver{
display:flex;
gap:8px;
margin-top:8px;
align-items:center;
}

.driver img{
width:40px;
height:40px;
border-radius:50%;
}

/* BUTTON */
.btn{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
font-weight:700;
background:#D4AF37;
}

.btn.red{
background:#ff4444;
color:#fff;
}

.btn.whatsapp{
background:#25D366;
color:#000;
}

/* ARCHIVE */
.archive{
padding:10px;
border-top:1px solid #222;
}
</style>
</head>

<body>

<div class="header">
<div class="topbar">
<div id="date"></div>
<div class="clock" id="clock"></div>
</div>
<h2>Dashboard Restaurant</h2>
</div>

<div class="kpi" id="kpi"></div>

<div class="board" id="board"></div>

<div class="archive">
<h3>📁 Historique</h3>
<div id="archive"></div>
</div>

<script>

// 🔥 FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyA-Dh3VguPXVk27DwOkMjRbYIXEhrEPcsM",
authDomain:"cizafood.firebaseapp.com",
projectId:"cizafood"
});

const db = firebase.firestore();
const restaurantName="Chez André";

let lastIds=[];

// ⏰ CLOCK LIVE
setInterval(()=>{
let d=new Date();
document.getElementById("clock").innerText=d.toLocaleTimeString();
document.getElementById("date").innerText=d.toLocaleDateString();
},1000);

// 🔔 SOUND
function playSound(){
new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
}

// TIMER
function timer(ts){
if(!ts)return "";
let min=Math.floor((Date.now()-ts)/60000);
return `<div class="timer ${min>15?"urgent":""}">⏱ ${min} min</div>`;
}

// DRIVER
function driver(o){
if(!o.assignedDriverId)return "";
return `
<div class="driver">
<img src="${o.driverPhoto||'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">
<div>
${o.driverName||""}<br>
${o.vehicleType||""} ${o.vehicleColor||""}<br>
${o.plateNumber||""}
</div>
</div>`;
}

// CARD
function card(o){
return `
<div class="card">

<b>${o.clientName||"Client"}</b>

${timer(o.restaurantAcceptedAt||o.createdAt)}

<div class="meta">
📍 ${o.deliveryAddress?.province||""}, ${o.deliveryAddress?.commune||""}<br>
📌 ${o.deliveryAddress?.quartier||""}<br>
🧭 ${o.deliveryAddress?.repere||""}<br>
📞 ${o.clientPhone||""}
</div>

<div class="meta">
🍽 ${(o.items||[]).map(i=>i.name).join(", ")}
</div>

<div class="meta">💰 ${o.total||0} BIF</div>

${driver(o)}

<a class="btn whatsapp" href="https://wa.me/${(o.clientPhone||"").replace("+","")}">WhatsApp</a>
<a class="btn" href="tel:${o.clientPhone}">Appeler</a>

${actions(o)}

</div>`;
}

// ACTIONS
function actions(o){

if(o.status==="pending_restaurant"){
return `
<button class="btn" onclick="update('${o.id}','accepted')">Accepter</button>
<button class="btn red" onclick="update('${o.id}','rejected')">Refuser</button>`;
}

if(o.status==="accepted"){
return `<button class="btn" onclick="update('${o.id}','preparing')">Préparer</button>`;
}

if(o.status==="preparing"){
return `<button class="btn" onclick="update('${o.id}','ready')">Prêt</button>`;
}

return "";
}

// UPDATE
async function update(id,status){
await db.runTransaction(async tx=>{
let ref=db.collection("orders").doc(id);
let snap=await tx.get(ref);
if(!snap.exists)return;

let d=snap.data();
if(d.restaurant!==restaurantName)return;

tx.update(ref,{
status:status,
restaurantAcceptedAt:Date.now()
});
});
}

// LISTEN
db.collection("orders").onSnapshot(snap=>{

let orders=[];

snap.forEach(doc=>{
let o=doc.data();
if(o.restaurant!==restaurantName)return;
orders.push({id:doc.id,...o});
});

// 🔔 NEW ORDER DETECTION
let newIds=orders.map(o=>o.id);
if(lastIds.length && newIds.length>lastIds.length){
playSound();
}
lastIds=newIds;

// KPI
document.getElementById("kpi").innerHTML=`
<div class="box">📦 ${orders.length}</div>
<div class="box">💰 ${orders.reduce((s,o)=>s+(o.total||0),0)}</div>
<div class="box">🆕 ${orders.filter(o=>o.status==="pending_restaurant").length}</div>
<div class="box">👨‍🍳 ${orders.filter(o=>o.status==="preparing").length}</div>
`;

// BOARD
document.getElementById("board").innerHTML=`
<div class="column">
<h3>🆕</h3>
${orders.filter(o=>o.status==="pending_restaurant").map(card).join("")}
</div>

<div class="column">
<h3>👨‍🍳</h3>
${orders.filter(o=>o.status==="preparing").map(card).join("")}
</div>

<div class="column">
<h3>📦</h3>
${orders.filter(o=>o.status==="ready").map(card).join("")}
</div>

<div class="column">
<h3>🚗</h3>
${orders.filter(o=>o.status==="picked").map(card).join("")}
</div>
`;

// ARCHIVE
document.getElementById("archive").innerHTML=
orders.filter(o=>o.status==="delivered"||o.status==="rejected")
.map(o=>`<div class="card">${o.clientName} - ${o.total} BIF</div>`).join("");

});

</script>

</body>
</html>
