<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CizaFood+ - Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:#0B0B0C;
color:#fff;
}

.app{
max-width:420px;
margin:auto;
min-height:100vh;
padding:20px;
padding-bottom:100px;
}

.header{
font-size:24px;
font-weight:800;
margin-bottom:20px;
}

.card{
background:#151517;
border:1px solid #1f1f23;
padding:18px;
border-radius:18px;
margin-bottom:14px;
}

.title{
font-size:16px;
font-weight:700;
margin-bottom:6px;
}

.meta{
font-size:13px;
color:#aaa;
margin-bottom:10px;
}

.status{
font-size:13px;
color:#D4AF37;
margin-bottom:10px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#D4AF37;
color:#000;
font-weight:700;
cursor:pointer;
margin-top:8px;
}

.tabbar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#0B0B0C;
border-top:1px solid #1c1c1c;
display:flex;
justify-content:space-around;
padding:12px;
}

.tab{color:#777;font-size:14px;}
.active{color:#D4AF37;}
</style>
</head>

<body>

<div class="app" id="app"></div>

<div class="tabbar">
<div class="tab active" onclick="loadOrders()">📦 Commandes</div>
<div class="tab" onclick="menu()">🍽️ Menu</div>
<div class="tab" onclick="profile()">👤 Profil</div>
</div>

<script>

/// 🔥 FIREBASE INIT
const firebaseConfig = {
  apiKey: "AIzaSyA-Dh3VguPXVk27DwOkMjRbYIXEhrEPcsM",
  authDomain: "cizafood.firebaseapp.com",
  projectId: "cizafood",
  storageBucket: "cizafood.firebasestorage.app",
  messagingSenderId: "695527669049",
  appId: "1:695527669049:web:256ddb7aaf2af2df293ce8"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

auth.signInAnonymously();

/// 🔥 IDENTITÉ RESTAURANT
const restaurantName = "Chez André";

/// 🔥 LISTEN TEMPS RÉEL
function listenOrders(callback){
  db.collection("orders").onSnapshot(snapshot=>{
    let orders=[];
    snapshot.forEach(doc=>{
      orders.push({id:doc.id,...doc.data()});
    });
    callback(orders);
  });
}

/// 🔥 UPDATE
function updateOrder(id,data){
  return db.collection("orders").doc(id).update(data);
}

/// 🔥 UI COMMANDES
function loadOrders(){

listenOrders((all)=>{

let orders = all.filter(o => o.restaurant === restaurantName);

let html=`<div class="header">Commandes</div>`;

if(orders.length===0){
html+=`<div class="card">Aucune commande</div>`;
}

orders.forEach(o=>{

html+=`
<div class="card">
<div class="title">${o.clientUid || "Client"}</div>
<div class="meta">${(o.items || []).map(i=>i.name).join(", ")}</div>
<div class="status">${getStatusLabel(o.status)}</div>

${getActions(o)}

</div>
`;

});

app.innerHTML=html;

});

}

/// LABEL STATUS
function getStatusLabel(status){

if(status==="pending") return "En attente";
if(status==="accepted") return "Acceptée";
if(status==="preparing") return "En préparation";
if(status==="ready") return "Prêt";
if(status==="picked") return "En livraison";
if(status==="delivered") return "Livré";

return status;
}

/// ACTIONS
function getActions(o){

if(o.status==="pending"){
return `<button class="btn" onclick="accept('${o.id}')">Accepter</button>`;
}

if(o.status==="accepted"){
return `<button class="btn" onclick="prepare('${o.id}')">Préparer</button>`;
}

if(o.status==="preparing"){
return `<button class="btn" onclick="ready('${o.id}')">Marquer prêt</button>`;
}

return "";
}

/// ACTIONS UPDATE
function accept(id){
updateOrder(id,{status:"accepted"});
}

function prepare(id){
updateOrder(id,{status:"preparing"});
}

function ready(id){
updateOrder(id,{status:"ready"});
}

/// MENU
function menu(){
app.innerHTML=`
<div class="header">Menu</div>
<div class="card">Gestion du menu (à connecter plus tard)</div>
`;
}

/// PROFIL
function profile(){
app.innerHTML=`
<div class="header">Profil restaurant</div>
<div class="card">Informations du restaurant</div>
`;
}

/// INIT
loadOrders();

</script>

</body>
</html>
