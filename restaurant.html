<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CizaFood+ Restaurant PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:Inter;background:#0B0B0C;color:#fff;margin:0;padding:20px;}
.card{background:#151517;padding:18px;border-radius:16px;margin-bottom:15px;}
.btn{padding:12px;border:none;border-radius:10px;background:#D4AF37;margin-top:8px;width:100%;font-weight:700;}
.btn.red{background:#ff4444;color:#fff;}
.header{font-size:24px;font-weight:800;margin-bottom:15px;}
.meta{font-size:13px;color:#aaa;margin-top:6px;}
.badge{padding:4px 8px;border-radius:8px;font-size:12px;margin-top:6px;display:inline-block;}

/* DRIVER */
.driver{
margin-top:12px;
padding:12px;
border-radius:12px;
background:#0f0f11;
display:flex;
gap:10px;
align-items:center;
}

.driver img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
}

.driver-info{
font-size:13px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

const firebaseConfig = {
apiKey:"AIzaSyA-Dh3VguPXVk27DwOkMjRbYIXEhrEPcsM",
authDomain:"cizafood.firebaseapp.com",
projectId:"cizafood"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const restaurantName="Chez André";

// LISTEN
db.collection("orders").onSnapshot(snapshot=>{

let orders=[];

snapshot.forEach(doc=>{
let o=doc.data();
if(o.restaurant!==restaurantName) return;

orders.push({id:doc.id,...o});
});

// TRI
orders.sort((a,b)=>{
const p={pending_restaurant:1,accepted:2,preparing:3,ready:4,picked:5,delivered:6};
return (p[a.status]||99)-(p[b.status]||99);
});

let html=`<div class="header">Commandes</div>`;

orders.forEach(o=>{

html+=`
<div class="card">

<div><b>${o.clientName || "Client"}</b></div>

<div class="meta">
📍 ${o.quartier || "-"} <br>
📞 ${o.phone || "-"} <br>
💰 ${o.total || 0} BIF
</div>

<div class="meta">
🍽 ${(o.items||[]).map(i=>i.name).join(", ")}
</div>

<div class="badge">${label(o.status)}</div>

${driverBlock(o)}

${actions(o)}

</div>
`;

});

document.getElementById("app").innerHTML=html;

});

// LABEL
function label(s){
return {
pending_restaurant:"🕒 Nouvelle commande",
accepted:"👨‍🍳 En préparation (livreur assigné)",
preparing:"👨‍🍳 Préparation",
ready:"📦 Prête",
picked:"🚗 En livraison",
delivered:"🎉 Livré",
rejected:"❌ Refusée"
}[s] || s;
}

// 🔥 DRIVER INFO UI
function driverBlock(o){

if(!o.assignedDriverId) return "";

return `
<div class="driver">

<img src="${o.driverPhoto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">

<div class="driver-info">
<b>${o.driverName || "Livreur"}</b><br>
🚗 ${o.vehicleType || "-"} ${o.vehicleBrand || ""} (${o.vehicleColor || ""})<br>
🪪 ${o.plateNumber || "-"}
</div>

</div>
`;
}

// ACTIONS
function actions(o){

if(o.status==="pending_restaurant"){
return `
<button class="btn" onclick="accept('${o.id}')">Accepter</button>
<button class="btn red" onclick="reject('${o.id}')">Refuser</button>
`;
}

if(o.status==="accepted"){
return `<button class="btn" onclick="prepare('${o.id}')">Préparer</button>`;
}

if(o.status==="preparing"){
return `<button class="btn" onclick="ready('${o.id}')">Marquer prêt</button>`;
}

return "";
}

// UPDATE SÉCURISÉ
async function secureUpdate(id,data){

try{

await db.runTransaction(async tx=>{
let ref=db.collection("orders").doc(id);
let snap=await tx.get(ref);

if(!snap.exists) return;

let d=snap.data();

if(d.restaurant!==restaurantName) return;
if(d.status==="delivered") return;

tx.update(ref,data);
});

}catch(e){
alert("Erreur réseau");
}
}

// ACTIONS
function accept(id){
secureUpdate(id,{status:"accepted"});
}

function reject(id){
secureUpdate(id,{status:"rejected"});
}

function prepare(id){
secureUpdate(id,{status:"preparing"});
}

function ready(id){
secureUpdate(id,{status:"ready"});
}

</script>

</body>
</html>
