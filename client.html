<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CizaFood+</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0B0B0C;color:#fff;}
.app{max-width:420px;margin:auto;padding-bottom:120px;}

.header{
display:flex;align-items:center;gap:10px;
font-size:20px;font-weight:800;padding:20px;
}

.back{
background:#1a1a1d;border-radius:50%;
width:35px;height:35px;
display:flex;align-items:center;justify-content:center;
cursor:pointer;
}

.menu{
margin:10px;background:#151517;padding:12px;
border-radius:16px;display:flex;gap:10px;align-items:center;
}

.menu img{width:90px;height:90px;border-radius:12px;object-fit:cover;}

.menu-info{flex:1;}
.menu-price{color:#D4AF37;font-weight:800;}

.btn{
padding:10px;border:none;border-radius:10px;
background:#D4AF37;font-weight:800;width:100%;
}

.step{
margin:10px;padding:12px;border-radius:12px;
background:#151517;
}

.activeStep{
border:1px solid #D4AF37;
}

.notif{
position:fixed;top:20px;left:10px;right:10px;
background:#D4AF37;color:#000;padding:14px;
border-radius:14px;text-align:center;display:none;
}
</style>
</head>

<body>

<div class="notif" id="notif"></div>
<div class="app" id="app"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const appF = initializeApp({
apiKey:"AIzaSyA-Dh3VguPXVk27DwOkMjRbYIXEhrEPcsM",
projectId:"cizafood"
});

const db = getFirestore(appF);

let cart=[];
let currentOrderId=null;
let unsubscribeMenu=null;

const restaurantData={
id:"resto_chez_andre",
name:"Chez André"
};

function notifShow(t){
notif.innerText=t;
notif.style.display="block";
setTimeout(()=>notif.style.display="none",3000);
}

// HOME
window.renderHome=function(){
app.innerHTML=`
<div class="header">CizaFood+</div>

<div onclick="openRestaurant()" style="margin:15px;">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092" style="width:100%;border-radius:20px;">
</div>
`;
}

// RESTO
window.openRestaurant=function(){

app.innerHTML=`
<div class="header">${restaurantData.name}</div>
<div id="menuList"></div>

<div style="position:fixed;bottom:20px;left:15px;right:15px;">
<button class="btn" onclick="openCart()">Panier (${cart.length})</button>
</div>
`;

loadMenu();
}

// MENU
function loadMenu(){

if(unsubscribeMenu) unsubscribeMenu();

unsubscribeMenu = onSnapshot(collection(db,"items"),snap=>{

let html="";

snap.forEach(doc=>{
let i=doc.data();

if(i.restaurantId!==restaurantData.id) return;

html+=`
<div class="menu">
<img src="${i.photo||''}">
<div class="menu-info">
<div>${i.name}</div>
<div>${i.price} BIF</div>
</div>
<button class="btn" onclick="add('${i.name}',${i.price})">+</button>
</div>
`;
});

menuList.innerHTML=html;

});
}

// CART
window.add=(n,p)=>{cart.push({name:n,price:p});notifShow("Ajouté");}

window.openCart=function(){

let total=0;
let html=`<div class="header">Panier</div>`;

cart.forEach(i=>{
total+=i.price;
html+=`<div class="menu">${i.name} - ${i.price}</div>`;
});

html+=`<div class="menu"><b>Total ${total} BIF</b></div>`;
html+=`<button class="btn" onclick="checkout(${total})">Commander</button>`;

app.innerHTML=html;
}

// CHECKOUT
window.checkout=async function(total){

const ref = await addDoc(collection(db,"orders"),{
restaurantId:restaurantData.id,
items:cart,
total,
status:"pending_restaurant",
createdAt:Date.now()
});

currentOrderId = ref.id;
cart=[];

notifShow("Commande envoyée");

// 🔥 TRACKING DIRECT
trackOrder();
}

// 🔥 TRACKING REALTIME
function trackOrder(){

onSnapshot(doc(db,"orders",currentOrderId),(snap)=>{
let o=snap.data();
if(!o)return;

renderTracking(o);
});
}

// UI TRACKING
function renderTracking(o){

let steps={
pending_restaurant:"En attente restaurant",
accepted:"Acceptée",
preparing:"Préparation",
ready:"Prête",
assigned:"Chauffeur assigné",
picked:"En livraison",
delivered:"Livré"
};

app.innerHTML=`
<div class="header">Suivi commande</div>

<div style="margin:15px;font-weight:700;">
${steps[o.status]||"En cours"}
</div>

${Object.keys(steps).map(s=>`
<div class="step ${Object.keys(steps).indexOf(s)<=Object.keys(steps).indexOf(o.status)?"activeStep":""}">
${steps[s]}
</div>
`).join("")}
`;
}

renderHome();

</script>

</body>
</html>
