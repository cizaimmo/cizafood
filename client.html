<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CizaFood+ - Commander</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<!-- 🔥 MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0B0B0C;color:#fff;}
.app{max-width:420px;margin:auto;min-height:100vh;padding:20px;padding-bottom:100px;}
.header{font-size:24px;font-weight:800;margin-bottom:15px;}
.search{width:100%;padding:16px;border-radius:16px;border:none;background:#151517;color:#fff;margin-bottom:20px;outline:none;}
.restaurant{background:#151517;border:1px solid #1f1f23;padding:18px;border-radius:18px;margin-bottom:14px;cursor:pointer;transition:0.2s;}
.restaurant:active{transform:scale(0.97);}
.name{font-size:17px;font-weight:700;margin-bottom:5px;}
.meta{font-size:13px;color:#aaa;}
.menu{background:#151517;padding:16px;border-radius:16px;margin-bottom:12px;}
.price{color:#D4AF37;font-weight:700;margin:8px 0;}
.btn{width:100%;padding:14px;border:none;border-radius:14px;background:#D4AF37;color:#000;font-weight:700;cursor:pointer;}
.back{margin-top:20px;color:#D4AF37;cursor:pointer;font-weight:600;}
.cartbar{position:fixed;bottom:80px;left:10px;right:10px;background:#D4AF37;color:#000;padding:14px;border-radius:16px;display:flex;justify-content:space-between;font-weight:700;}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#0B0B0C;border-top:1px solid #1c1c1c;display:flex;justify-content:space-around;padding:12px;}
.tab{color:#777;font-size:14px;}
.active{color:#D4AF37;}
.step{background:#151517;padding:14px;border-radius:12px;margin-bottom:8px;}
.activeStep{border:1px solid #D4AF37;background:#1f1a0a;}
</style>
</head>

<body>

<div class="app" id="app"></div>

<div id="cartbar" class="cartbar" style="display:none;" onclick="openCart()"></div>

<div class="tabbar">
<div class="tab active" onclick="renderHome()">🏠</div>
<div class="tab" onclick="openCart()">🛒</div>
<div class="tab" onclick="profile()">👤</div>
</div>

<script>

/// 🔥 FIREBASE INIT
const firebaseConfig = {
  apiKey: "AIzaSyA-Dh3VguPXVk27DwOkMjRbYIXEhrEPcsM",
  authDomain: "cizafood.firebaseapp.com",
  projectId: "cizafood",
  storageBucket: "cizafood.firebasestorage.app",
  messagingSenderId: "695527669049",
  appId: "1:695527669049:web:256ddb7aaf2af2df293ce8"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

auth.signInAnonymously();

/// 🔥 FIRESTORE FUNCTIONS

function createOrder(data){
  return db.collection("orders").add({
    ...data,
    status:"pending",
    createdAt: Date.now()
  });
}

function updateOrder(id,data){
  return db.collection("orders").doc(id).update(data);
}

function listenOrders(callback){
  db.collection("orders").onSnapshot(snapshot=>{
    let orders=[];
    snapshot.forEach(doc=>{
      orders.push({id:doc.id,...doc.data()});
    });
    callback(orders);
  });
}

/// APP LOGIC

let cart=[];
let currentOrder=null;

const restaurants=[
{
name:"Chez André",
meta:"Cuisine locale • 20 min",
menu:[
{name:"Poulet braisé",price:9000},
{name:"Frites",price:3000}
]
},
{
name:"Pizza Bujumbura",
meta:"Pizza • 25 min",
menu:[
{name:"Pizza",price:12000},
{name:"Boisson",price:2000}
]
}
];

function renderHome(){
let html=`<div class="header">Commander</div>
<input class="search" placeholder="🔍 Rechercher">`;

restaurants.forEach((r,i)=>{
html+=`
<div class="restaurant" onclick="openRestaurant(${i})">
<div class="name">${r.name}</div>
<div class="meta">${r.meta}</div>
</div>`;
});

app.innerHTML=html;
}

function openRestaurant(i){
let r=restaurants[i];

let html=`<div class="header">${r.name}</div>`;

r.menu.forEach(m=>{
html+=`
<div class="menu">
${m.name}
<div class="price">${m.price} BIF</div>
<button class="btn" onclick="add('${m.name}',${m.price})">Ajouter</button>
</div>`;
});

html+=`<div class="back" onclick="renderHome()">← Retour</div>`;

app.innerHTML=html;
}

function add(name,price){
cart.push({name,price});
updateCart();
}

function updateCart(){
if(cart.length===0){
cartbar.style.display="none";
return;
}

let total=cart.reduce((a,b)=>a+b.price,0);
cartbar.style.display="flex";
cartbar.innerHTML=`${cart.length} • ${total} BIF`;
}

function openCart(){

if(cart.length===0){
app.innerHTML=`<div class="header">Panier vide</div>`;
return;
}

let html=`<div class="header">Panier</div>`;
let total=0;

cart.forEach((i,index)=>{
total+=i.price;
html+=`
<div class="menu">
${i.name} - ${i.price}
<button onclick="remove(${index})">Supprimer</button>
</div>`;
});

html+=`
<div class="header">Total ${total} BIF</div>
<button class="btn" onclick="checkout(${total})">Commander</button>
`;

app.innerHTML=html;
}

function remove(i){
cart.splice(i,1);
openCart();
updateCart();
}

function checkout(total){

createOrder({
restaurant:"Chez André",
clientUid: auth.currentUser.uid,
items:cart,
total
});

cart=[];
updateCart();
}

/// 🔥 LISTEN LIVE CLIENT

listenOrders((orders)=>{

let my = orders.find(o=>o.clientUid===auth.currentUser.uid);

if(my){
currentOrder = my;
trackOrder(my);
}

});

/// TRACKING + MAP

function trackOrder(order){

let html=`<div class="header">Suivi commande</div>
<div id="map" style="height:220px;border-radius:16px;margin-bottom:10px;"></div>`;

let steps=["pending","accepted","preparing","ready","picked","delivered"];

steps.forEach(s=>{
let active=isStepActive(order.status,s);
html+=`<div class="step ${active?"activeStep":""}">${s}</div>`;
});

app.innerHTML=html;

initMap(order);
}

let map, marker;

function initMap(order){

map = L.map('map').setView([-3.3822, 29.3644], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

L.marker([-3.3822,29.3644]).addTo(map);

if(order.driverLat){
marker=L.marker([order.driverLat,order.driverLng]).addTo(map);
}else{
marker=L.marker([-3.39,29.36]).addTo(map);
}
}

function isStepActive(current,step){
const order=["pending","accepted","preparing","ready","picked","delivered"];
return order.indexOf(step)<=order.indexOf(current);
}

function profile(){
app.innerHTML=`<div class="header">Profil</div>`;
}

renderHome();

</script>

</body>
</html>
