<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CizaFood+</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0B0B0C;color:#fff;}
.app{max-width:420px;margin:auto;min-height:100vh;padding-bottom:120px;}
.header{font-size:26px;font-weight:800;padding:20px;}

.restaurant{margin:15px;border-radius:22px;overflow:hidden;position:relative;}
.restaurant img{width:100%;height:180px;object-fit:cover;}
.restaurant-info{position:absolute;bottom:0;left:0;right:0;padding:15px;background:linear-gradient(transparent,rgba(0,0,0,0.9));}

.menu{margin:15px;background:#151517;padding:18px;border-radius:18px;}
.price{color:#D4AF37;margin:5px 0;}

.btn{width:100%;padding:14px;border:none;border-radius:16px;background:#D4AF37;color:#000;font-weight:800;}

input,select{
width:100%;
padding:14px;
margin:6px 0;
border-radius:12px;
border:none;
background:#1a1a1d;
color:#fff;
}

#map{height:220px;border-radius:18px;margin:15px;}

.tabbar{position:fixed;bottom:0;left:0;right:0;background:#0B0B0C;border-top:1px solid #1c1c1c;display:flex;justify-content:space-around;padding:14px;}
.tab{color:#777;}
.active{color:#D4AF37;}

.notif{position:fixed;top:20px;left:10px;right:10px;background:#D4AF37;color:#000;padding:14px;border-radius:14px;text-align:center;display:none;}

.step{margin:10px;background:#151517;padding:12px;border-radius:12px;}
.activeStep{border:1px solid #D4AF37;}
</style>
</head>

<body>

<div class="notif" id="notif"></div>
<div class="app" id="app"></div>

<div class="tabbar">
<div class="tab active" onclick="renderHome()">🏠</div>
<div class="tab" onclick="openCart()">🛒</div>
<div class="tab" onclick="profile()">👤</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, deleteUser } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyA-Dh3VguPXVk27DwOkMjRbYIXEhrEPcsM",
authDomain: "cizafood.firebaseapp.com",
projectId: "cizafood",
storageBucket: "cizafood.firebasestorage.app",
messagingSenderId: "695527669049",
appId: "1:695527669049:web:256ddb7aaf2af2df293ce8"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const auth = getAuth();

let cart=[];
let currentOrderId=null;
let userLocation=null;

// GPS
navigator.geolocation.getCurrentPosition(
pos=>{
userLocation={lat:pos.coords.latitude,lng:pos.coords.longitude};
},
()=>{
notifShow("⚠️ Active ta localisation pour une livraison sécurisée");
}
);

// NOTIF
function notifShow(t){
notif.innerText=t;
notif.style.display="block";
setTimeout(()=>notif.style.display="none",3000);
}

// HOME
window.renderHome=function(){
app.innerHTML=`
<div class="header">CizaFood+</div>

<div class="restaurant" onclick="openRestaurant()">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
<div class="restaurant-info">
<div>Chez André</div>
</div>
</div>
`;
}

// RESTO
window.openRestaurant=function(){
app.innerHTML=`
<div class="header">Chez André</div>

<div class="menu">
Poulet braisé<div class="price">9000</div>
<button class="btn" onclick="add('Poulet',9000)">Ajouter</button>
</div>

<div class="menu">
Frites<div class="price">3000</div>
<button class="btn" onclick="add('Frites',3000)">Ajouter</button>
</div>
`;
}

// ADD
window.add=function(name,price){
cart.push({name,price});
notifShow("Ajouté");
}

// PANIER PREMIUM
window.openCart=function(){

if(cart.length===0){
app.innerHTML=`<div class="header">Panier vide</div>`;
return;
}

let total=0;
let html=`<div class="header">Panier</div>`;

cart.forEach((item,index)=>{

if(!item.qty) item.qty=1;

let itemTotal=item.price*item.qty;
total+=itemTotal;

html+=`
<div class="menu">

<div style="display:flex;justify-content:space-between;align-items:center;">
<div>
<b>${item.name}</b>
<div class="price">${item.price} BIF</div>
</div>

<div style="display:flex;gap:10px;">
<button onclick="decrease(${index})">−</button>
<div>${item.qty}</div>
<button onclick="increase(${index})">+</button>
</div>
</div>

<div style="margin-top:10px;display:flex;justify-content:space-between;">
<div>Total : ${itemTotal} BIF</div>
<button onclick="removeItem(${index})">Supprimer</button>
</div>

</div>
`;
});

html+=`<div class="menu"><b>Total : ${total} BIF</b></div>`;

html+=`
<input id="province" placeholder="Province">
<input id="commune" placeholder="Commune">
<input id="quartier" placeholder="Quartier">
<input id="repere" placeholder="Repère">
<input id="phone" placeholder="Téléphone WhatsApp">

<button class="btn" onclick="checkout(${total})">
Commander ${total} BIF
</button>
`;

app.innerHTML=html;
}

window.increase=i=>{cart[i].qty=(cart[i].qty||1)+1;openCart();}
window.decrease=i=>{cart[i].qty>1?cart[i].qty--:cart.splice(i,1);openCart();}
window.removeItem=i=>{cart.splice(i,1);openCart();}

// CHECKOUT
window.checkout=async function(total){

if(!province.value || !commune.value || !quartier.value || !phone.value){
notifShow("Complète les infos");
return;
}

const ref=await addDoc(collection(db,"orders"),{
restaurant:"Chez André",
clientName:"Client Ciza",
clientId:"client_demo",
items:cart,
total,
status:"pending",
clientLat:userLocation?.lat||-3.38,
clientLng:userLocation?.lng||29.36,
province:province.value,
commune:commune.value,
quartier:quartier.value,
repere:repere.value,
phone:phone.value,
createdAt:Date.now()
});

currentOrderId=ref.id;
cart=[];
notifShow("Commande envoyée");
track();
}

// TRACK
function track(){
onSnapshot(doc(db,"orders",currentOrderId),(d)=>{
let o=d.data();
if(!o)return;
renderTracking(o);
});
}

function renderTracking(o){
app.innerHTML=`<div class="header">Suivi</div><div id="map"></div>`;
let map=L.map('map').setView([o.clientLat,o.clientLng],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.marker([o.clientLat,o.clientLng]).addTo(map);
}

// PROFIL PREMIUM
window.profile=function(){

let user=auth.currentUser;

if(!user){
app.innerHTML=`<div class="header">Profil</div>`;
return;
}

let name=user.email?user.email.split("@")[0]:"Client";

app.innerHTML=`
<div class="profile">
<div class="avatar"></div>
<h2>${name}</h2>
<div class="info">${user.email}</div>
<div id="map"></div>

<button class="btn" onclick="deleteAccount()">Supprimer compte</button>
</div>
`;

let map=L.map('map').setView([userLocation?.lat||-3.38,userLocation?.lng||29.36],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.marker([userLocation?.lat||-3.38,userLocation?.lng||29.36]).addTo(map);
}

window.deleteAccount=function(){
if(!confirm("Supprimer compte ?"))return;
deleteUser(auth.currentUser).then(()=>notifShow("Compte supprimé"));
}

renderHome();

</script>

</body>
</html>
