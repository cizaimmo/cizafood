<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciza Driver</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;background:#0B0B0C;color:#fff;font-family:Arial;}
#map{height:60vh;}
.btn{
width:100%;
padding:16px;
border:none;
background:#D4AF37;
color:#000;
font-weight:bold;
margin-top:10px;
}
.card{padding:15px;}
</style>
</head>

<body>

<div id="map"></div>

<div class="card">
<button class="btn" onclick="start()">📍 Activer GPS</button>
<button class="btn" onclick="accept()">✅ Accepter course</button>
<button class="btn" onclick="pickup()">🚗 En route</button>
<button class="btn" onclick="deliver()">📦 Livré</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA-Dh3VguPXVk27DwOkMjRbYIXEhrEPcsM",
authDomain: "cizafood.firebaseapp.com",
projectId: "cizafood"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentOrderId = null;
let myLat = -3.38;
let myLng = 29.36;
let map;

// MAP INIT
map = L.map('map').setView([myLat,myLng],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker = L.marker([myLat,myLng]).addTo(map);

// GPS LIVE
function start(){
navigator.geolocation.watchPosition(pos=>{
myLat = pos.coords.latitude;
myLng = pos.coords.longitude;

marker.setLatLng([myLat,myLng]);
map.setView([myLat,myLng]);

// 🔥 UPDATE FIRESTORE
if(currentOrderId){
updateDoc(doc(db,"orders",currentOrderId),{
driverLat: myLat,
driverLng: myLng
});
}

});
}

// LISTEN ORDERS
onSnapshot(collection(db,"orders"),snap=>{
snap.forEach(d=>{
let data = d.data();

// prendre première commande pending
if(data.status==="pending" && !currentOrderId){
currentOrderId = d.id;
console.log("Order assigned:", currentOrderId);
}
});
});

// ACTIONS
window.accept = async function(){
if(!currentOrderId)return;

await updateDoc(doc(db,"orders",currentOrderId),{
status:"accepted"
});
}

window.pickup = async function(){
if(!currentOrderId)return;

await updateDoc(doc(db,"orders",currentOrderId),{
status:"picked"
});
}

window.deliver = async function(){
if(!currentOrderId)return;

await updateDoc(doc(db,"orders",currentOrderId),{
status:"delivered"
});
}

</script>

</body>
</html>
