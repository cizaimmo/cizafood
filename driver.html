<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CizaFood+ - Chauffeur</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:#0B0B0C;
color:#fff;
}

.app{
max-width:420px;
margin:auto;
min-height:100vh;
padding:20px;
padding-bottom:100px;
}

.header{
font-size:24px;
font-weight:800;
margin-bottom:20px;
}

.card{
background:#151517;
border:1px solid #1f1f23;
padding:18px;
border-radius:18px;
margin-bottom:14px;
}

.title{
font-size:16px;
font-weight:700;
margin-bottom:6px;
}

.meta{
font-size:13px;
color:#aaa;
margin-bottom:10px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#D4AF37;
color:#000;
font-weight:700;
cursor:pointer;
margin-top:10px;
}

.status{
font-size:13px;
color:#D4AF37;
margin-top:8px;
}

.tabbar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#0B0B0C;
border-top:1px solid #1c1c1c;
display:flex;
justify-content:space-around;
padding:12px;
}

.tab{color:#777;font-size:14px;}
.active{color:#D4AF37;}
</style>
</head>

<body>

<div class="app" id="app"></div>

<div class="tabbar">
<div class="tab active" onclick="loadOrders()">📦 Courses</div>
<div class="tab" onclick="history()">📜 Historique</div>
<div class="tab" onclick="profile()">👤 Profil</div>
</div>

<script src="orders.js"></script>

<script>

// 🔥 GPS LIVE
let watchId = null;

function startGPS(){

if(!navigator.geolocation){
alert("GPS non supporté");
return;
}

watchId = navigator.geolocation.watchPosition(pos=>{

let lat = pos.coords.latitude;
let lng = pos.coords.longitude;

// mettre à jour commandes du chauffeur
let myOrders = getOrders().filter(o => o.driver==="me" && o.status!=="delivered");

myOrders.forEach(o=>{
updateOrder(o.id,{
driverLat:lat,
driverLng:lng
});
});

}, err=>{
console.log("Erreur GPS", err);
},{
enableHighAccuracy:true,
maximumAge:5000,
timeout:5000
});

}

// STOP GPS (option pro)
function stopGPS(){
if(watchId){
navigator.geolocation.clearWatch(watchId);
}
}

// COMMANDES
function loadOrders(){

let all = getOrders();

let html=`<div class="header">Courses disponibles</div>`;

let list = all.filter(o =>
o.status==="pending" ||
(o.status!=="delivered" && o.driver==="me")
);

if(list.length===0){
html+=`<div class="card">Aucune course disponible</div>`;
}

list.forEach(o=>{

html+=`
<div class="card">
<div class="title">${o.restaurant}</div>
<div class="meta">Client : ${o.client}</div>
<div class="status">${o.status}</div>
${renderButton(o)}
</div>
`;

});

document.getElementById("app").innerHTML=html;
}

// BOUTONS
function renderButton(o){

if(o.status==="pending"){
return `<button class="btn" onclick="accept(${o.id})">Accepter</button>`;
}

if(o.status==="accepted" && o.driver==="me"){
return `<button class="btn" onclick="pickup(${o.id})">Récupéré</button>`;
}

if(o.status==="picked" && o.driver==="me"){
return `<button class="btn" onclick="deliver(${o.id})">Livré</button>`;
}

return "";
}

// ACTIONS
function accept(id){
updateOrder(id,{
status:"accepted",
driver:"me"
});
loadOrders();
}

function pickup(id){
updateOrder(id,{
status:"picked"
});
loadOrders();
}

function deliver(id){
updateOrder(id,{
status:"delivered"
});
loadOrders();
}

// HISTORIQUE
function history(){

let done = getOrders().filter(o=>o.status==="delivered");

let html=`<div class="header">Historique</div>`;

if(done.length===0){
html+=`<div class="card">Aucune livraison terminée</div>`;
}

done.forEach(o=>{
html+=`
<div class="card">
<div class="title">${o.restaurant}</div>
<div class="meta">${o.client}</div>
<div class="status">Livré</div>
</div>
`;
});

document.getElementById("app").innerHTML=html;
}

// PROFIL
function profile(){
document.getElementById("app").innerHTML=`
<div class="header">Profil chauffeur</div>
<div class="card">Nom, véhicule, statut actif</div>
`;
}

// INIT
loadOrders();
startGPS(); // 🔥 ACTIVER GPS

</script>

</body>
</html>
