<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CizaFood+</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B0B0C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="CizaFood+">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#0B0B0C;
color:#fff;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

/* LOGO */
.logo{
width:260px;
max-width:85%;
margin-bottom:50px;
}

/* SUBTITLE */
.subtitle{
color:#aaa;
font-size:15px;
margin-bottom:30px;
text-align:center;
}

/* BUTTON */
.btn{
width:100%;
max-width:420px;
padding:16px;
border-radius:14px;
border:1px solid #1f1f23;
background:#151517;
color:#fff;
font-size:15px;
font-weight:600;
margin-top:14px;
cursor:pointer;
transition:0.2s;
}

.btn:active{
transform:scale(0.97);
}

.btn:hover{
border-color:#D4AF37;
}

/* FOOTER */
.footer{
position:absolute;
bottom:20px;
text-align:center;
font-size:12px;
color:#888;
}
</style>
</head>

<body>

<img src="https://raw.githubusercontent.com/cizaimmo/cizafood/d4e54f9e35499c7e929b38238a0ecb5bd94d2a25/F262698A-75D3-4960-B6DB-229091B6EDFF.png" class="logo">

<div class="subtitle">Choisissez votre rôle</div>

<button class="btn" onclick="go('client')">👤 Commander</button>
<button class="btn" onclick="go('driver')">🚚 Livrer</button>
<button class="btn" onclick="go('restaurant')">🍽️ Restaurant</button>

<div class="footer">
CizaFood+<br>
Division de Ciza Group | Burundi 🇧🇮
</div>

<script>
function go(role){

if(role==="client"){
alert("Espace client");
}

if(role==="driver"){
alert("Espace chauffeur");
}

if(role==="restaurant"){
alert("Espace restaurant");
}

}
</script>

</body>
</html>
