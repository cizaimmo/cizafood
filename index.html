<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CizaFood+</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B0B0C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="CizaFood+">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#0B0B0C;
color:#fff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* CONTAINER */
.app{
width:100%;
max-width:420px;
padding:20px;
position:relative;
}

/* SCREENS */
.screen{
display:none;
}

.active{
display:block;
}

/* LOGO ULTRA DOMINANT */
.logo{
width:300px;
max-width:90%;
display:block;
margin:0 auto 60px;
}

/* TEXT */
.subtitle{
text-align:center;
color:#9a9a9f;
font-size:16px;
margin-bottom:35px;
}

/* BUTTON PREMIUM */
.btn{
width:100%;
padding:18px;
border-radius:18px;
border:1px solid #1f1f23;
background:linear-gradient(180deg,#151517,#101012);
color:#fff;
font-size:16px;
font-weight:600;
margin-top:16px;
cursor:pointer;
transition:0.2s;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.btn:hover{
border-color:#D4AF37;
}

.btn:active{
transform:scale(0.97);
}

/* BUTTON PRIMARY */
.btn-primary{
border-color:#D4AF37;
box-shadow:0 0 20px rgba(212,175,55,0.2);
}

/* HEADER SCREEN */
.header{
font-size:22px;
font-weight:800;
margin-bottom:25px;
}

/* BACK */
.back{
margin-top:30px;
color:#D4AF37;
font-weight:600;
cursor:pointer;
}

/* FOOTER */
.footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
font-size:12px;
color:#777;
}
</style>
</head>

<body>

<div class="app">

<!-- HOME -->
<div id="home" class="screen active">

<img src="https://raw.githubusercontent.com/cizaimmo/cizafood/d4e54f9e35499c7e929b38238a0ecb5bd94d2a25/F262698A-75D3-4960-B6DB-229091B6EDFF.png" class="logo">

<div class="subtitle">Choisissez votre rôle</div>

<button class="btn btn-primary" onclick="go('client')">👤 Commander</button>
<button class="btn" onclick="go('driver')">🚚 Livrer</button>
<button class="btn" onclick="go('restaurant')">🍽️ Restaurant</button>

</div>

<!-- CLIENT -->
<div id="client" class="screen">
<div class="header">Espace client</div>

<div class="back" onclick="go('home')">← Retour</div>
</div>

<!-- DRIVER -->
<div id="driver" class="screen">
<div class="header">Espace chauffeur</div>

<div class="back" onclick="go('home')">← Retour</div>
</div>

<!-- RESTAURANT -->
<div id="restaurant" class="screen">
<div class="header">Espace restaurant</div>

<div class="back" onclick="go('home')">← Retour</div>
</div>

<div class="footer">
CizaFood+<br>
Division de Ciza Group | Burundi 🇧🇮
</div>

</div>

<script>
function go(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
