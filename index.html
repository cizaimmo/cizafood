<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CizaFood+</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#0B0B0C;
  color:#fff;
}

/* HEADER */
.header{
  position:fixed;
  top:0;
  width:100%;
  background:#0B0B0C;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #1c1c1c;
  z-index:1000;
}

.logo{
  height:28px;
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.3s;
  z-index:2000;
}

.sidebar.active{
  left:0;
}

.sidebar h3{
  margin-bottom:20px;
}

.sidebar a{
  display:block;
  color:#fff;
  text-decoration:none;
  padding:12px 0;
  border-bottom:1px solid #222;
}

/* MAIN */
.main{
  padding:80px 16px 80px;
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:12px;
  color:#888;
  margin-top:40px;
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0B0B0C;
  display:flex;
  justify-content:space-around;
  border-top:1px solid #1c1c1c;
  padding:10px 0;
}

.bottom-nav div{
  text-align:center;
  font-size:12px;
  color:#aaa;
  cursor:pointer;
}

.bottom-nav div.active{
  color:#D4AF37;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Menu</h3>
  <a href="#">Profil</a>
  <a href="#">Paramètres</a>
  <a href="#">Confidentialité</a>
  <a href="#">Conditions</a>
  <a href="#">Support</a>
  <a href="#">Déconnexion</a>
</div>

<!-- HEADER -->
<div class="header">
  <img src="logo-dark.png" class="logo">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<!-- MAIN -->
<div class="main">

  <h2>Bienvenue 👋</h2>
  <p style="color:#aaa;margin-top:10px;">
    Recherchez un restaurant ou un plat
  </p>

  <!-- Exemple contenu -->
  <div style="margin-top:20px;">
    <div style="background:#151517;padding:16px;border-radius:12px;margin-bottom:12px;">
      🍔 Restaurant Burger House  
      <br><span style="color:#aaa;">20-30 min</span>
    </div>

    <div style="background:#151517;padding:16px;border-radius:12px;">
      🍕 Pizza Express  
      <br><span style="color:#aaa;">15-25 min</span>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    CizaFood+<br>
    Division de Ciza Group | Burundi 🇧🇮
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="active">🏠<br>Accueil</div>
  <div>🔍<br>Recherche</div>
  <div>🛒<br>Commandes</div>
  <div>👤<br>Profil</div>
</div>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}
</script>

</body>
</html>
