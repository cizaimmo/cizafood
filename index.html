<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CizaFood+</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#0B0B0C;
color:#fff;
}

/* SCREENS */
.screen{
display:none;
min-height:100vh;
padding:20px;
}

.active{display:block;}

/* HOME CENTER */
.center{
display:flex;
flex-direction:column;
justify-content:center;
}

/* LOGO */
.logo{
width:260px;
max-width:85%;
margin:0 auto 60px;
display:block;
}

/* CARDS ROLE */
.role-card{
background:#151517;
padding:18px;
border-radius:18px;
margin-top:15px;
cursor:pointer;
transition:0.2s;
border:1px solid #1c1c1c;
}

.role-card:hover{
transform:translateY(-3px);
}

.role-title{
font-weight:600;
font-size:16px;
}

.role-desc{
font-size:12px;
color:#aaa;
margin-top:4px;
}

/* HEADER */
.header{
font-size:20px;
font-weight:700;
margin-bottom:20px;
}

/* SEARCH */
.search{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#151517;
color:#fff;
margin-bottom:15px;
}

/* RESTO CARD */
.card{
background:#151517;
padding:16px;
border-radius:14px;
margin-top:12px;
}

/* BUTTON BACK */
.back{
margin-top:20px;
color:#D4AF37;
cursor:pointer;
font-size:14px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active center">

<img src="https://raw.githubusercontent.com/cizaimmo/cizafood/d4e54f9e35499c7e929b38238a0ecb5bd94d2a25/F262698A-75D3-4960-B6DB-229091B6EDFF.png" class="logo">

<div class="role-card" onclick="go('client')">
<div class="role-title">👤 Commander</div>
<div class="role-desc">Commander vos repas facilement</div>
</div>

<div class="role-card" onclick="go('driver')">
<div class="role-title">🚚 Livrer</div>
<div class="role-desc">Gérer vos livraisons</div>
</div>

<div class="role-card" onclick="go('restaurant')">
<div class="role-title">🍽️ Restaurant</div>
<div class="role-desc">Recevoir et gérer les commandes</div>
</div>

</div>

<!-- CLIENT -->
<div id="client" class="screen">

<div class="header">Accueil</div>

<input class="search" placeholder="🔍 Rechercher un restaurant">

<div class="card">
🍔 Burger House<br>
<span style="color:#D4AF37">8000 BIF</span>
</div>

<div class="card">
🍕 Pizza Bujumbura<br>
<span style="color:#D4AF37">10000 BIF</span>
</div>

<div class="back" onclick="go('home')">← Retour</div>

</div>

<!-- DRIVER -->
<div id="driver" class="screen">

<div class="header">Livraisons</div>

<div class="card">
Aucune livraison disponible
</div>

<div class="back" onclick="go('home')">← Retour</div>

</div>

<!-- RESTAURANT -->
<div id="restaurant" class="screen">

<div class="header">Commandes</div>

<div class="card">
Aucune commande reçue
</div>

<div class="back" onclick="go('home')">← Retour</div>

</div>

<script>

function go(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

</script>

</body>
</html>
