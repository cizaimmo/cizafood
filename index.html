<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CizaFood+</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B0B0C">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#0B0B0C;
  color:#fff;
}

.header{
  position:fixed;
  top:0;
  width:100%;
  background:#0B0B0C;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #1c1c1c;
}

.logo{height:28px;}

.main{
  padding:80px 16px 80px;
}

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#151517;
  color:#fff;
  margin-bottom:10px;
}

button{
  background:#D4AF37;
  border:none;
  padding:12px;
  border-radius:10px;
  width:100%;
  margin-top:10px;
}

.card{
  background:#151517;
  padding:16px;
  border-radius:14px;
  margin-top:10px;
}

.footer{
  text-align:center;
  font-size:12px;
  color:#888;
  margin-top:40px;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#0B0B0C;
  border-top:1px solid #1c1c1c;
  padding:10px 0;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

</head>

<body>

<div class="header">
  <img src="https://raw.githubusercontent.com/cizaimmo/cizafood/main/F262698A-75D3-4960-B6DB-229091B6EDFF.png" class="logo">
</div>

<div class="main" id="app"></div>

<div class="bottom-nav">
  <div onclick="home()">🏠</div>
  <div onclick="openCart()">🛒</div>
  <div onclick="profile()">👤</div>
</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "XXXX",
  authDomain: "XXXX",
  projectId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// STATE
let cart = [];

// LOGIN
function loginUI(){
  app.innerHTML = `
    <h2>Connexion</h2>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
    <button onclick="signup()">Créer compte</button>
  `;
}

function login(){
  auth.signInWithEmailAndPassword(email.value, pass.value)
  .then(home)
  .catch(e=>alert(e.message));
}

function signup(){
  auth.createUserWithEmailAndPassword(email.value, pass.value)
  .then(home)
  .catch(e=>alert(e.message));
}

// HOME
function home(){
  app.innerHTML = `
    <input id="search" placeholder="🔍 Rechercher...">

    <div class="card" onclick="openRestaurant()">
      🍔 Burger House<br><small>20 min</small>
    </div>

    <div class="card">
      🍕 Pizza Kigali<br><small>15 min</small>
    </div>

    <div class="footer">
      CizaFood+<br>
      Division de Ciza Group | Burundi 🇧🇮
    </div>
  `;
}

// RESTAURANT
function openRestaurant(){
  app.innerHTML = `
    <h2>Menu</h2>

    <div class="card">
      Burger - 5000 RWF
      <button onclick="addToCart('Burger',5000)">Ajouter</button>
    </div>

    <div class="card">
      Frites - 2000 RWF
      <button onclick="addToCart('Frites',2000)">Ajouter</button>
    </div>

    <button onclick="home()">Retour</button>
  `;
}

// CART
function addToCart(name,price){
  cart.push({name,price});
  alert("Ajouté");
}

function openCart(){
  let total=0;

  let html = `<h2>Panier</h2>`;

  cart.forEach((i,idx)=>{
    total+=i.price;
    html+=`
      <div class="card">
        ${i.name} - ${i.price} RWF
        <button onclick="removeItem(${idx})">Supprimer</button>
      </div>
    `;
  });

  html+=`
    <h3>Total ${total} RWF</h3>
    <button onclick="checkout(${total})">Commander</button>
  `;

  app.innerHTML = html;
}

function removeItem(i){
  cart.splice(i,1);
  openCart();
}

// ORDER
function checkout(total){
  const user = auth.currentUser;

  db.collection("orders").add({
    uid:user.uid,
    items:cart,
    total,
    status:"pending",
    createdAt:new Date()
  });

  cart=[];
  alert("Commande envoyée ✅");
  home();
}

// PROFILE
function profile(){
  app.innerHTML = `
    <h2>Profil</h2>

    <button onclick="deleteAccount()">Supprimer mon compte</button>
  `;
}

// DELETE ACCOUNT (REAL)
function deleteAccount(){
  const user = auth.currentUser;

  user.delete().then(()=>{
    alert("Compte supprimé");
    loginUI();
  }).catch(e=>{
    alert("Reconnecte-toi pour supprimer");
  });
}

// INIT
auth.onAuthStateChanged(user=>{
  if(user) home();
  else loginUI();
});

</script>

</body>
</html>
