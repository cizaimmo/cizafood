<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CizaFood+</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#0B0B0C;
  color:#fff;
}

.main{
  padding:40px 20px 100px;
  text-align:center;
}

.logo{
  width:140px;
  margin:40px auto 20px;
  display:block;
}

h1{
  font-size:22px;
  margin-bottom:10px;
}

.subtitle{
  color:#aaa;
  margin-bottom:30px;
}

.btn{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  margin-top:12px;
  font-weight:600;
}

.gold{background:#D4AF37;color:#000;}
.dark{background:#151517;color:#fff;}

.input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#151517;
  color:#fff;
  margin-top:10px;
}

.card{
  background:#151517;
  padding:18px;
  border-radius:16px;
  margin-top:15px;
  text-align:left;
}

.footer{
  margin-top:40px;
  font-size:12px;
  color:#888;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"XXXX",
  authDomain:"XXXX",
  projectId:"XXXX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let role = null;

const UI = document.getElementById("app");

// LANDING
window.landing = function(){
UI.innerHTML = `
<img src="https://raw.githubusercontent.com/cizaimmo/cizafood/d4e54f9e35499c7e929b38238a0ecb5bd94d2a25/F262698A-75D3-4960-B6DB-229091B6EDFF.png" class="logo">

<h1>CizaFood+</h1>
<div class="subtitle">Choisissez votre rôle</div>

<button class="btn dark" onclick="selectRole('client')">👤 Commander</button>
<button class="btn dark" onclick="selectRole('driver')">🚚 Livrer</button>
<button class="btn dark" onclick="selectRole('restaurant')">🍽️ Restaurant</button>

<div class="footer">
CizaFood+<br>Division de Ciza Group | Burundi 🇧🇮
</div>
`;
}

// SELECT ROLE
window.selectRole = function(r){
role = r;
loginUI();
}

// LOGIN
window.loginUI = function(){
UI.innerHTML = `
<h1>Connexion</h1>

<input id="email" class="input" placeholder="Email">
<input id="pass" type="password" class="input" placeholder="Mot de passe">

<button class="btn gold" onclick="login()">Se connecter</button>
<button class="btn dark" onclick="signupUI()">Créer un compte</button>
`;
}

// SIGNUP UI (MULTI ROLE)
window.signupUI = function(){

let extra = "";

if(role==="driver"){
extra = `
<input id="vehicle" class="input" placeholder="Véhicule">
<input id="plate" class="input" placeholder="Plaque">
`;
}

if(role==="restaurant"){
extra = `
<input id="restaurant" class="input" placeholder="Nom du restaurant">
<input id="address" class="input" placeholder="Adresse">
`;
}

UI.innerHTML = `
<h1>Créer compte</h1>

<input id="name" class="input" placeholder="Nom">
<input id="phone" class="input" placeholder="Téléphone">
<input id="email" class="input" placeholder="Email">
<input id="pass" type="password" class="input" placeholder="Mot de passe">

${extra}

<button class="btn gold" onclick="signup()">Créer</button>
<button class="btn dark" onclick="loginUI()">Retour</button>
`;
}

// SIGNUP
window.signup = async function(){
const user = await createUserWithEmailAndPassword(auth,email.value,pass.value);

await setDoc(doc(db,"users",user.user.uid),{
role,
name:name.value,
phone:phone.value
});

home();
}

// LOGIN
window.login = async function(){
await signInWithEmailAndPassword(auth,email.value,pass.value);
home();
}

// HOME (CLIENT ONLY UI)
window.home = function(){
UI.innerHTML = `
<h1>Accueil</h1>

<input class="input" placeholder="🔍 Rechercher">

<div class="card">
🍔 Burger House<br>
<span style="color:#D4AF37;">8000 BIF</span>
<button class="btn gold" onclick="add()">Ajouter</button>
</div>

<div class="card">
🍕 Pizza Bujumbura<br>
<span style="color:#D4AF37;">10000 BIF</span>
<button class="btn gold" onclick="add()">Ajouter</button>
</div>
`;
}

window.add = function(){
alert("Ajouté au panier");
}

// INIT
onAuthStateChanged(auth,user=>{
if(user) home();
else landing();
});

</script>
</head>

<body>
<div id="app" class="main"></div>
</body>
</html>
